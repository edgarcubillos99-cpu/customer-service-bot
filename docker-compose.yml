services:
  clamav:
    image: clamav/clamav:latest
    container_name: clamav-service
    restart: unless-stopped
    # Puerto en el host (por defecto 3310). El servicio escucha siempre 3310 dentro de la red Docker.
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    # La imagen oficial ya define HEALTHCHECK (clamdcheck.sh, start-period ~6m en primera descarga de firmas).

  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: whatsapp-teams-bot
    restart: always
    depends_on:
      clamav:
        condition: service_healthy
    ports:
      - "${PORT}:${PORT}"
    environment:
      PORT: "${PORT}"
      MICROSOFT_APP_ID: "${MICROSOFT_APP_ID}"
      MICROSOFT_APP_PASSWORD: "${MICROSOFT_APP_PASSWORD}"
      MICROSOFT_APP_TENANT_ID: "${MICROSOFT_APP_TENANT_ID}"
      MICROSOFT_APP_TYPE: "${MICROSOFT_APP_TYPE}"
      TEAMS_CHANNEL_ID: "${TEAMS_CHANNEL_ID}"
      TEAMS_TEAM_ID: "${TEAMS_TEAM_ID}"
      TEAMS_BOT_NAME: "${TEAMS_BOT_NAME}"
      WHATSAPP_WABA_ID: "${WHATSAPP_WABA_ID}"
      WHATSAPP_TOKEN: "${WHATSAPP_TOKEN}"
      WHATSAPP_PHONE_ID: "${WHATSAPP_PHONE_ID}"
      WHATSAPP_VERIFY_TOKEN: "${WHATSAPP_VERIFY_TOKEN}"
      PUBLIC_URL: "${PUBLIC_URL}"
      # Con .env vacío, Compose aplica estos valores (red interna: host = nombre del servicio clamav).
      ENABLE_CLAMAV: "${ENABLE_CLAMAV:-true}"
      CLAMAV_USE_DAEMON: "${CLAMAV_USE_DAEMON:-true}"
      CLAMAV_HOST: "${CLAMAV_HOST:-clamav}"
      CLAMAV_PORT: "${CLAMAV_PORT:-3310}"
      BUSINESS_HOURS_START: "${BUSINESS_HOURS_START}"
      BUSINESS_HOURS_END: "${BUSINESS_HOURS_END}"
      BUSINESS_DAYS: "${BUSINESS_DAYS}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
      UBERSMITH_API_URL: "${UBERSMITH_API_URL}"
      UBERSMITH_API_USER: "${UBERSMITH_API_USER}"
      UBERSMITH_API_PASS: "${UBERSMITH_API_PASS}"
      META_VERIFY_TOKEN: "${META_VERIFY_TOKEN}"
      META_PAGE_ACCESS_TOKEN: "${META_PAGE_ACCESS_TOKEN}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  clamav-data:
